<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rick King Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#070708;
    --silver-1:#d7dade;
    --silver-2:#8b9096;
    --silver-dim:#54585e;
    --turquoise:#34e0cf;
    --turquoise-deep:#1ba99a;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{height:100%;}

  body{
    background:
      radial-gradient(120% 90% at 50% -10%, #16181b 0%, var(--black) 55%, #030304 100%);
    color:var(--silver-1);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  body::after{
    content:"";
    position:fixed;inset:0;
    background:radial-gradient(140% 120% at 50% 50%, transparent 60%, rgba(0,0,0,.55) 100%);
    pointer-events:none;
  }

  header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:34px clamp(28px,6vw,84px);
    position:relative;z-index:2;
  }

  .logo{
    display:inline-flex;
    align-items:center;
    line-height:0;
  }
  .logo svg{
    height:clamp(34px,4.4vw,46px);
    width:auto;
    display:block;
  }
  .logo svg path{
    fill:var(--silver-1);
    transition:fill .45s ease, filter .45s ease;
  }
  .logo:hover svg path{
    fill:var(--turquoise);
    filter:drop-shadow(0 0 14px rgba(52,224,207,.35));
  }

  nav{display:flex;gap:clamp(18px,3vw,40px);}

  nav a{
    font-family:'Inter',sans-serif;
    font-size:.7rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--silver-dim);
    text-decoration:none;
    position:relative;
    padding:6px 0;
    transition:color .45s ease;
  }
  nav a::after{
    content:"";
    position:absolute;left:0;bottom:0;
    width:0;height:1px;
    background:var(--turquoise);
    transition:width .45s cubic-bezier(.2,.7,.2,1);
  }
  nav a:hover{color:var(--turquoise);}
  nav a:hover::after{width:100%;}

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;z-index:2;
    padding:0 24px;
  }

  .wordmark{
    font-family:'Archivo',sans-serif;
    line-height:.95;
    cursor:default;
  }

  .wordmark .line1{
    display:block;
    font-weight:600;
    font-size:clamp(2.9rem,10.5vw,8rem);
    letter-spacing:.1em;
    text-transform:uppercase;
    padding-left:.1em;
    background:linear-gradient(180deg,#f2f4f6 0%,#aeb3b9 42%,#5c6066 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    transition:filter .6s ease;
    opacity:0;
    animation:rise 1.1s ease forwards .2s;
  }

  .wordmark .line2{
    display:block;
    font-weight:300;
    font-size:clamp(.7rem,2.3vw,1.35rem);
    letter-spacing:.42em;
    text-transform:uppercase;
    color:var(--silver-2);
    margin-top:26px;
    padding-left:.42em;
    opacity:0;
    animation:rise 1.1s ease forwards .4s;
  }

  .wordmark:hover .line1{
    filter:drop-shadow(0 0 26px rgba(52,224,207,.22));
  }

  .divider{
    width:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--silver-dim),transparent);
    margin:46px 0 30px;
    animation:grow 1.4s cubic-bezier(.2,.7,.2,1) forwards .65s;
  }

  .tagline{
    font-family:'Inter',sans-serif;
    font-weight:300;
    font-size:clamp(.85rem,2vw,1.05rem);
    color:var(--silver-2);
    letter-spacing:.12em;
    opacity:0;
    animation:rise 1.1s ease forwards .8s;
  }
  .tagline b{
    font-weight:500;
    color:var(--silver-1);
    transition:color .45s ease;
  }
  .tagline:hover b{color:var(--turquoise);}

  footer{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:22px;
    padding:30px 24px 40px;
    position:relative;z-index:2;
  }
  footer span{
    font-family:'Inter',sans-serif;
    font-size:.65rem;
    letter-spacing:.34em;
    text-transform:uppercase;
    color:var(--silver-dim);
    transition:color .45s ease;
  }
  footer span:hover{color:var(--turquoise-deep);}
  .foot-link{
    font-family:'Inter',sans-serif;
    font-size:.65rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--silver-dim);
    text-decoration:none;
    transition:color .45s ease;
  }
  .foot-link:hover{color:var(--turquoise);}

  @keyframes rise{
    from{opacity:0;transform:translateY(16px);}
    to{opacity:1;transform:translateY(0);}
  }
  @keyframes grow{
    from{width:0;}
    to{width:min(260px,42vw);}
  }

  @media (max-width:560px){
    nav{gap:16px;}
    .wordmark .line2{letter-spacing:.3em;padding-left:.3em;}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;}
    .wordmark .line1,.wordmark .line2,.tagline{opacity:1;}
    .divider{width:min(260px,42vw);}
  }
</style>
</head>
<body>

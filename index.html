<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#070708">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<title>Rick King Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#070708;
    --silver-1:#d7dade;
    --silver-2:#8b9096;
    --silver-dim:#54585e;
    --turquoise:#34e0cf;
    --turquoise-deep:#1ba99a;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html{
    height:100%;
    background:#030304;            /* dunkler Untergrund: kein weißer Streifen unten */
  }
  body{height:100%;}
  html,body{overscroll-behavior:none;}   /* kein weißes Gummiband beim Scrollen */

  body{
    background-color:#070708;
    background:
      radial-gradient(120% 90% at 50% -10%, #16181b 0%, var(--black) 55%, #030304 100%);
    color:var(--silver-1);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    min-height:100svh;       /* dynamische Höhe für mobile Browserleisten */
    display:flex;
    flex-direction:column;
    overflow-x:hidden;        /* nur horizontales Überlaufen sperren, vertikal scrollbar */
  }

  body::after{
    content:"";
    position:fixed;inset:0;
    background:radial-gradient(140% 120% at 50% 50%, transparent 60%, rgba(0,0,0,.55) 100%);
    pointer-events:none;
  }

  header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:34px clamp(28px,6vw,84px);
    position:relative;z-index:2;
  }

  .logo{
    display:inline-flex;
    align-items:center;
    line-height:0;
  }
  .logo svg{
    height:clamp(34px,4.4vw,46px);
    width:auto;
    display:block;
  }
  .logo svg path{
    fill:var(--silver-1);
    transition:fill .45s ease, filter .45s ease;
  }
  .logo:hover svg path{
    fill:var(--turquoise);
    filter:drop-shadow(0 0 14px rgba(52,224,207,.35));
  }

  nav{display:flex;gap:clamp(18px,3vw,40px);}

  nav a{
    font-family:'Inter',sans-serif;
    font-size:.7rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--silver-dim);
    text-decoration:none;
    position:relative;
    padding:6px 0;
    transition:color .45s ease;
  }
  nav a::after{
    content:"";
    position:absolute;left:0;bottom:0;
    width:0;height:1px;
    background:var(--turquoise);
    transition:width .45s cubic-bezier(.2,.7,.2,1);
  }
  nav a:hover{color:var(--turquoise);}
  nav a:hover::after{width:100%;}

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;z-index:2;
    padding:48px 24px;        /* vertikaler Puffer: kein Abschneiden im Querformat */
  }

  .wordmark{
    font-family:'Archivo',sans-serif;
    line-height:.95;
    cursor:default;
    display:inline-block;   /* shrink to width of the name -> line2 matches it */
  }

  .wordmark .line1{
    display:block;
    font-weight:600;
    font-size:clamp(2.3rem,8vw,5.8rem);
    letter-spacing:.04em;
    text-transform:uppercase;
    padding-left:.04em;
    background:linear-gradient(180deg,#f2f4f6 0%,#aeb3b9 42%,#5c6066 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    transition:filter .6s ease;
    opacity:0;
    animation:rise 1.1s ease forwards .2s;
  }

  /* one continuous line, sized by JS to exactly match the name's width */
  .wordmark .line2{
    display:block;
    white-space:nowrap;
    text-align:left;
    font-weight:400;
    font-size:clamp(.9rem,3.4vw,2.4rem);
    letter-spacing:0;
    text-transform:uppercase;
    color:var(--silver-2);
    margin-top:22px;
    opacity:0;
    animation:rise 1.1s ease forwards .4s;
  }

  .wordmark:hover .line1{
    filter:drop-shadow(0 0 26px rgba(52,224,207,.22));
  }

  .divider{
    width:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--silver-dim),transparent);
    margin:48px 0 32px;
    animation:grow 1.4s cubic-bezier(.2,.7,.2,1) forwards .65s;
  }

  /* tagline: technical brackets + slow metallic turquoise sheen sweeping across */
  .tagline{
    display:inline-flex;
    align-items:center;
    gap:.85em;
    font-family:'Inter',sans-serif;
    font-weight:400;
    font-size:clamp(.58rem,1.5vw,.9rem);
    letter-spacing:.27em;
    text-transform:uppercase;
    padding-left:.27em;
    white-space:nowrap;
    opacity:0;
    animation:rise 1.1s ease forwards .8s;
    cursor:default;
  }
  .tagline .brk{
    color:var(--turquoise-deep);
    font-weight:500;
    transition:color .5s ease, text-shadow .5s ease;
  }
  .tagline .txt{
    background:linear-gradient(100deg,
      var(--silver-2) 0%, var(--silver-2) 38%,
      #f4f6f7 46%, var(--turquoise) 50%, #f4f6f7 54%,
      var(--silver-2) 62%, var(--silver-2) 100%);
    background-size:260% auto;
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    animation:sheen 7s linear infinite;
  }
  .tagline:hover .brk{
    color:var(--turquoise);
    text-shadow:0 0 12px rgba(52,224,207,.5);
  }

  /* icon row (line-art, silver -> turquoise on hover; ready to be "lit" turquoise) */
  .icons{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:clamp(16px,5vw,34px);
    margin-top:34px;
    opacity:0;
    animation:rise 1.1s ease forwards .92s;
  }
  .icons .ico{
    flex:0 0 auto;
    color:var(--silver-2);
    line-height:0;
    transition:color .45s ease, filter .45s ease, transform .45s ease;
  }
  .icons .ico svg{
    width:clamp(34px,8.5vw,50px);
    height:auto;
    display:block;
  }
  .icons .ico:hover{
    color:var(--turquoise);
    filter:drop-shadow(0 0 11px rgba(52,224,207,.55));
    transform:translateY(-2px);
  }

  /* email row */
  .email{
    display:inline-flex;
    align-items:center;
    gap:11px;
    margin-top:30px;
    font-family:'Inter',sans-serif;
    font-size:clamp(.82rem,1.7vw,.96rem);
    letter-spacing:.06em;
    color:var(--silver-1);
    text-decoration:none;
    opacity:0;
    animation:rise 1.1s ease forwards 1.05s;
    transition:color .45s ease;
  }
  .email svg{
    width:1.05em;height:1.05em;
    stroke:var(--silver-2);
    stroke-width:1.6;
    fill:none;
    transition:stroke .45s ease, filter .45s ease;
  }
  .email span{position:relative;}
  .email span::after{
    content:"";position:absolute;left:0;bottom:-3px;
    width:0;height:1px;background:var(--turquoise);
    transition:width .45s cubic-bezier(.2,.7,.2,1);
  }
  .email:hover{color:var(--turquoise);}
  .email:hover svg{stroke:var(--turquoise);filter:drop-shadow(0 0 8px rgba(52,224,207,.4));}
  .email:hover span::after{width:100%;}

  @keyframes sheen{
    from{background-position:200% center;}
    to{background-position:-60% center;}
  }

  footer{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:22px;
    padding:30px 24px 40px;
    position:relative;z-index:2;
  }
  footer span{
    font-family:'Inter',sans-serif;
    font-size:.65rem;
    letter-spacing:.34em;
    text-transform:uppercase;
    color:var(--silver-dim);
    transition:color .45s ease;
  }
  footer span:hover{color:var(--turquoise-deep);}
  .foot-link{
    font-family:'Inter',sans-serif;
    font-size:.65rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--silver-dim);
    text-decoration:none;
    transition:color .45s ease;
  }
  .foot-link:hover{color:var(--turquoise);}

  @keyframes rise{
    from{opacity:0;transform:translateY(16px);}
    to{opacity:1;transform:translateY(0);}
  }
  @keyframes grow{
    from{width:0;}
    to{width:min(260px,42vw);}
  }

  @media (max-width:560px){
    header{padding:24px 22px;}
    nav{gap:16px;}
    nav a{font-size:.66rem;letter-spacing:.2em;}
    .tagline{letter-spacing:.08em;gap:.4em;}
    .email{margin-top:26px;}
  }

  @media (max-width:380px){
    header{padding:20px 18px;}
    nav{gap:13px;}
    nav a{font-size:.6rem;letter-spacing:.14em;}
    main{padding:36px 18px;}
    .tagline{letter-spacing:.04em;gap:.32em;}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;}
    .wordmark .line1,.wordmark .line2,.tagline,.icons,.email{opacity:1;}
    .divider{width:min(260px,42vw);}
  }
</style>
</head>

  <script>
  (function(){
    function ink(el){
      var r=document.createRange();
      r.selectNodeContents(el);
      return r.getBoundingClientRect().width;
    }
    function fit(){
      var l1=document.querySelector('.wordmark .line1');
      var l2=document.querySelector('.wordmark .line2');
      if(!l1||!l2) return;
      // reset before measuring
      l2.style.letterSpacing='0px';
      l2.style.marginRight='0px';
      l2.style.fontSize='';
      var T=ink(l1);                 // width of "RICK KING"
      if(!T) return;
      var base=parseFloat(getComputedStyle(l2).fontSize);
      var N=ink(l2);
      if(!N) return;
      // scale font so the natural line fills ~97% of the name width
      var nf=base*(0.97*T)/N;
      l2.style.fontSize=nf+'px';
      var N2=ink(l2);
      var n=l2.textContent.length;   // distribute the small remainder as even tracking
      var s=(T-N2)/(n-1);
      if(s<0) s=0;
      l2.style.letterSpacing=s+'px';
      l2.style.marginRight=(-s)+'px';

      // match the icon row to the exact width of the name, edge-to-edge
      var icons=document.querySelector('.icons');
      if(icons){
        icons.style.width=T+'px';
        icons.style.maxWidth='100%';
        icons.style.gap='0px';
        icons.style.justifyContent='space-between';
      }
    }
    if(document.fonts && document.fonts.ready){ document.fonts.ready.then(fit); }
    window.addEventListener('load', fit);
    var t; window.addEventListener('resize', function(){ clearTimeout(t); t=setTimeout(fit,120); });
  })();
  </script>
